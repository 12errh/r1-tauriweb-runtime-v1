[target.wasm32-wasi]
linker = "C:\\LLVM\\bin\\clang.exe"

[target.wasm32-wasip1]
linker = "C:\\LLVM\\bin\\clang.exe"


[env]
CC_wasm32_wasi      = "C:\\LLVM\\bin\\clang.exe"
CC_wasm32_wasip1    = "C:\\LLVM\\bin\\clang.exe"
CC_wasm32_unknown_unknown = "C:\\LLVM\\bin\\clang.exe"
AR_wasm32_wasi      = "C:\\LLVM\\bin\\llvm-ar.exe"
AR_wasm32_wasip1    = "C:\\LLVM\\bin\\llvm-ar.exe"
AR_wasm32_unknown_unknown = "C:\\LLVM\\bin\\llvm-ar.exe"
CFLAGS_wasm32_wasi  = "--sysroot=C:\\wasi-sdk\\share\\wasi-sysroot -I C:\\wasi-sdk\\share\\wasi-sysroot\\include\\wasm32-wasi -DSQLITE_OS_OTHER=1"
CFLAGS_wasm32_wasip1= "--sysroot=C:\\wasi-sdk\\share\\wasi-sysroot -I C:\\wasi-sdk\\share\\wasi-sysroot\\include\\wasm32-wasip1 -DSQLITE_OS_OTHER=1"
CFLAGS_wasm32_unknown_unknown = "--sysroot=C:\\wasi-sdk\\share\\wasi-sysroot -I C:\\wasi-sdk\\share\\wasi-sysroot\\include\\wasm32-wasi -DSQLITE_OS_OTHER=1"
